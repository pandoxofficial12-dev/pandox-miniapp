<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PandoX 🐼 - MiniApp Deluxe 4.0</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
/* General Reset */
* {margin:0; padding:0; box-sizing:border-box;}
body, html {width:100%; height:100%; overflow:hidden; font-family: 'Orbitron', sans-serif; color:#fff; background:#000020;}

/* Background & Stars */
#bgCanvas {position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;}

/* Logo */
#logoContainer {position:relative; width:200px; margin:40px auto; text-align:center;}
#logo {width:150px; animation: floatLogo 6s ease-in-out infinite; filter: drop-shadow(0 0 15px #00f0ff);}
@keyframes floatLogo {0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}

/* Glow effect on hover */
#logo:hover {filter: drop-shadow(0 0 25px #00f0ff) drop-shadow(0 0 10px #00f0ff); transform: scale(1.05); transition:0.3s;}

/* Header */
h1 {text-align:center; font-size:2rem; margin-top:20px; color:#00f0ff; text-shadow:0 0 10px #00f0ff;}

/* MiniHub Cards */
#miniHub {display:flex; flex-wrap:wrap; justify-content:center; margin-top:40px; gap:20px;}
.card {background:linear-gradient(135deg,#001f40,#004080); padding:20px; border-radius:15px; width:200px; text-align:center; box-shadow:0 0 20px rgba(0,255,255,0.5); transition:0.3s; cursor:pointer; position:relative; overflow:hidden;}
.card:hover {box-shadow:0 0 40px rgba(0,255,255,0.8); transform:translateY(-5px);}

/* Card Titles */
.card h2 {margin-bottom:15px; font-size:1.2rem; color:#00f0ff;}

/* Buttons */
button {padding:10px 20px; border:none; border-radius:8px; background:#00f0ff; color:#000; font-weight:bold; cursor:pointer; transition:0.3s;}
button:hover {background:#00ffff; transform:scale(1.05);}

/* Games Canvas */
canvas.gameCanvas {background:#000020; border:2px solid #00f0ff; border-radius:10px; display:block; margin:10px auto;}
.score {color:#00f0ff; font-weight:bold; text-align:center; margin-top:5px;}

/* Particle style for logo and background interaction */
.particle {position:absolute; width:4px; height:4px; background:#00f0ff; border-radius:50%; opacity:0.8; animation: drift 6s infinite;}
@keyframes drift {0%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}100%{transform:translate(0,0);}}
</style>
</head>
<body>

<!-- Background canvas -->
<canvas id="bgCanvas"></canvas>

<!-- Logo -->
<div id="logoContainer">
  <img id="logo" src="https://i.imgur.com/AygwFab.png" alt="PandoX Logo">
  <h1>PandoX 🐼 – MiniApp Deluxe 4.0</h1>
</div>

<!-- MiniHub Games -->
<div id="miniHub">
  <div class="card" onclick="startClicker()">
    <h2>Clicker Game</h2>
    <button>Start</button>
    <div id="clickerScore" class="score">Score: 0</div>
  </div>

  <div class="card" onclick="startSnake()">
    <h2>Snake Game</h2>
    <button>Start</button>
    <canvas id="snakeCanvas" class="gameCanvas" width="180" height="180"></canvas>
    <div id="snakeScore" class="score">Score: 0</div>
  </div>

  <div class="card" onclick="startDino()">
    <h2>Dino Run</h2>
    <button>Start</button>
    <canvas id="dinoCanvas" class="gameCanvas" width="180" height="180"></canvas>
    <div id="dinoScore" class="score">Score: 0</div>
  </div>
</div>

<script>
// ------------------------------
// Background Stars
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const stars = [];
for(let i=0;i<150;i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.5+0.5, d:Math.random()*0.5});
}
function drawStars(){
  ctx.fillStyle='black';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='white';
  for(let s of stars){
    ctx.globalAlpha = s.d;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }
}
function updateStars(){
  for(let s of stars){
    s.y += 0.2;
    if(s.y>canvas.height){s.y=0; s.x=Math.random()*canvas.width;}
  }
}
function animateStars(){drawStars(); updateStars(); requestAnimationFrame(animateStars);}
animateStars();

// ------------------------------
// Clicker Game
let clickerScore = 0;
function startClicker(){
  clickerScore=0;
  document.getElementById('clickerScore').innerText = 'Score: 0';
  const button = event.currentTarget.querySelector('button');
  button.onclick = () => {clickerScore++; document.getElementById('clickerScore').innerText='Score: '+clickerScore;};
}

// ------------------------------
// Snake Game
let snakeInterval, snakeScore=0;
function startSnake(){
  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  let size = 10, snake=[{x:80,y:80}], food={x:Math.floor(Math.random()*18)*10,y:Math.floor(Math.random()*18)*10}, dir={x:0,y:0};
  snakeScore=0;
  clearInterval(snakeInterval);
  snakeInterval = setInterval(gameSnake,100);
  function gameSnake(){
    ctx.fillStyle='#000020'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='lime';
    for(let s of snake) ctx.fillRect(s.x,s.y,size,size);
    ctx.fillStyle='red'; ctx.fillRect(food.x,food.y,size,size);
    let nx=snake[0].x+dir.x*size, ny=snake[0].y+dir.y*size;
    if(nx<0||nx>=canvas.width||ny<0||ny>=canvas.height||snake.some(s=>s.x===nx&&s.y===ny)){clearInterval(snakeInterval); return;}
    snake.unshift({x:nx,y:ny});
    if(nx===food.x&&ny===food.y){snakeScore++; document.getElementById('snakeScore').innerText='Score: '+snakeScore; food={x:Math.floor(Math.random()*18)*10,y:Math.floor(Math.random()*18)*10};} 
    else snake.pop();
  }
  document.onkeydown=e=>{
    if(e.key==='ArrowUp' && dir.y===0) dir={x:0,y:-1};
    if(e.key==='ArrowDown' && dir.y===0) dir={x:0,y:1};
    if(e.key==='ArrowLeft' && dir.x===0) dir={x:-1,y:0};
    if(e.key==='ArrowRight' && dir.x===0) dir={x:1,y:0};
  }
}

// ------------------------------
// Dino Run Game
let dinoInterval, dinoScore=0;
function startDino(){
  const canvas = document.getElementById('dinoCanvas');
  const ctx = canvas.getContext('2d');
  let dino={x:30,y:140,w:20,h:20}, obstacle={x:180,y:140,w:10,h:20}, vy=0, gravity=1;
  dinoScore=0;
  clearInterval(dinoInterval);
  dinoInterval=setInterval(gameDino,50);
  function gameDino(){
    ctx.fillStyle='#000020'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='lime'; ctx.fillRect(dino.x,dino.y,dino.w,dino.h);
    ctx.fillStyle='red'; ctx.fillRect(obstacle.x,obstacle.y,obstacle.w,obstacle.h);
    // Gravity
    vy+=gravity; dino.y+=vy;
    if(dino.y>140){dino.y=140; vy=0;}
    // Collision
    if(dino.x<obstacle.x+dino.w && dino.x+dino.w>obstacle.x && dino.y<obstacle.y+dino.h && dino.y+dino.h>obstacle.y){
      clearInterval(dinoInterval); return;
    }
    // Move obstacle
    obstacle.x-=5; if(obstacle.x<0){obstacle.x=180; dinoScore++; document.getElementById('dinoScore').innerText='Score: '+dinoScore;}
  }
  document.onkeydown=e=>{
    if(e.key===' ' && dino.y===140) vy=-15;
  }
}

// ------------------------------
// Logo particles interaction
const logoContainer = document.getElementById('logoContainer');
for(let i=0;i<20;i++){
  let p=document.createElement('div'); p.className='particle'; p.style.left=Math.random()*200+'px'; p.style.top=Math.random()*50+'px';
  logoContainer.appendChild(p);
}
</script>

</body>
</html>
