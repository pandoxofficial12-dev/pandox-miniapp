<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandox Mini App 1.0 Deluxe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: auto;
      background: #111;
      color: #fff;
    }
    header {
      text-align: center;
      padding: 10px;
      background: #222;
    }
    h1 { margin: 0; }
    #menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    .game-btn {
      padding: 10px 20px;
      background: #444;
      border: none;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }
    #games {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    canvas {
      background: #000;
      border: 2px solid #fff;
    }
    #links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }
    .link-btn {
      padding: 8px 15px;
      background: #555;
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Pandox Mini App 1.0 Deluxe</h1>
  </header>

  <div id="menu">
    <button class="game-btn" onclick="showGame('dino')">Dino Run</button>
    <button class="game-btn" onclick="showGame('clicker')">Clicker Game</button>
    <button class="game-btn" onclick="showGame('snake')">Snake Game</button>
  </div>

  <div id="games">
    <canvas id="dinoCanvas" width="400" height="150" style="display:none;"></canvas>
    <canvas id="clickerCanvas" width="400" height="150" style="display:none;"></canvas>
    <canvas id="snakeCanvas" width="400" height="150" style="display:none;"></canvas>
  </div>

  <div id="links">
    <a href="https://t.me/PandoXOfficialCrypto" class="link-btn" target="_blank">Telegram</a>
    <a href="https://x.com/PandoXOfficial" class="link-btn" target="_blank">X</a>
    <a href="https://www.pufwallet.xyz/token/0xF968341A687D70BcF84121111CfBB5eF7148AC28" class="link-btn" target="_blank">PUFF Wallet</a>
  </div>

  <!-- Sonidos -->
  <audio id="clickSound" src="https://raw.githubusercontent.com/pandoxofficial12-dev/pandox-miniapp/main/assets/audio/click.wav.wav"></audio>
  <audio id="coinSound" src="https://raw.githubusercontent.com/pandoxofficial12-dev/pandox-miniapp/main/assets/audio/coin.wav.wav"></audio>
  <audio id="hitSound" src="https://raw.githubusercontent.com/pandoxofficial12-dev/pandox-miniapp/main/assets/audio/hit.wav.wav"></audio>
  <audio id="jumpSound" src="https://raw.githubusercontent.com/pandoxofficial12-dev/pandox-miniapp/main/assets/audio/jump.wav.wav"></audio>

  <script>
    // Variables de control de juegos
    const games = ['dino', 'clicker', 'snake'];
    function showGame(game) {
      games.forEach(g => {
        document.getElementById(g + 'Canvas').style.display = (g===game)?'block':'none';
      });
      startGame(game);
    }

    // Sprites
    const dinoSprite = new Image();
    dinoSprite.src = "https://i.imgur.com/oNDRmG8.jpeg";

    const coinSprite = new Image();
    coinSprite.src = "https://i.imgur.com/Eotu0ph.jpeg";

    const fireSprite = new Image();
    fireSprite.src = "https://i.imgur.com/MZHNoD1.png";

    // Función dummy de ejemplo para iniciar juegos
    function startGame(game) {
      console.log("Iniciando juego: " + game);
      // Aquí se agregará la lógica real del juego con sprites y sonidos
    }

    // Fondo animado simple (partículas)
    const canvasBg = document.createElement('canvas');
    canvasBg.width = window.innerWidth;
    canvasBg.height = window.innerHeight;
    canvasBg.style.position = 'fixed';
    canvasBg.style.top = '0';
    canvasBg.style.left = '0';
    canvasBg.style.zIndex = '-1';
    document.body.appendChild(canvasBg);
    const ctxBg = canvasBg.getContext('2d');

    const particles = [];
    for(let i=0;i<50;i++){
      particles.push({x:Math.random()*canvasBg.width, y:Math.random()*canvasBg.height, r:Math.random()*3+1, dx:(Math.random()-0.5)*1, dy:(Math.random()-0.5)*1});
    }

    function animateBg() {
      ctxBg.clearRect(0,0,canvasBg.width,canvasBg.height);
      particles.forEach(p=>{
        ctxBg.beginPath();
        ctxBg.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctxBg.fillStyle = "#ffcc00";
        ctxBg.fill();
        p.x += p.dx; p.y += p.dy;
        if(p.x>canvasBg.width)p.x=0;
        if(p.x<0)p.x=canvasBg.width;
        if(p.y>canvasBg.height)p.y=0;
        if(p.y<0)p.y=canvasBg.height;
      });
      requestAnimationFrame(animateBg);
    }
    animateBg();
  </script>

</body>
</html>
