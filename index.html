<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PandoX 🐼 Mini-App</title>
  <style>
    /* Fondo premium tipo logo */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      text-align: center;
      color: #fff;
      background: linear-gradient(135deg, #0f4d3d, #1f1f1f); /* Verde oscuro -> negro */
      background-size: cover;
      background-attachment: fixed;
    }

    /* Contenedor principal */
    .container {
      max-width: 650px;
      margin: 40px auto;
      padding: 30px;
      background: rgba(0,0,0,0.4);
      border-radius: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    /* Logo animado */
    #logo {
      width: 200px;
      animation: float 3s ease-in-out infinite;
      margin-bottom: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Títulos y textos */
    h1 {
      font-size: 2.2rem;
      margin-bottom: 15px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
    }

    p {
      font-size: 1rem;
      margin-bottom: 30px;
      line-height: 1.5;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
    }

    /* Botones principales */
    .button {
      display: inline-block;
      background: #00d084;
      color: #111;
      padding: 15px 30px;
      margin: 12px;
      border-radius: 15px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .button:hover {
      background: #00ff9f;
      transform: scale(1.1);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    /* Simulador Earn / Referidos */
    .earn-box {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 25px;
      margin: 25px 0;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .earn-box p {
      font-size: 1.1rem;
      margin: 12px 0;
    }

    .earn-box button {
      background: #ffd700;
      color: #111;
      padding: 12px 25px;
      border-radius: 12px;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .earn-box button:hover {
      background: #ffec7f;
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    /* Responsive */
    @media (max-width: 500px) {
      #logo { width: 150px; }
      .button { padding: 12px 22px; font-size: 0.9rem; }
      h1 { font-size: 1.7rem; }
      p { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo del Panda -->
    <img id="logo" src="https://i.imgur.com/AygwFab.png" alt="PandoX Panda Logo">

    <!-- Título -->
    <h1>PandoX 🐼</h1>

    <!-- Texto de presentación -->
    <p>¡La primera moneda meme creada públicamente!<br>
    Únete al experimento, reclama recompensas y forma parte de una comunidad que convierte los memes en diversión y oportunidades reales. 🚀🪙</p>

    <!-- Botones principales -->
    <a href="https://t.me/PandoXOfficialCrypto" class="button" target="_blank">Join Telegram</a>
    <a href="https://x.com/PandoXOfficial" class="button" target="_blank">Follow on X</a>
    <a href="#" class="button">Claim Reward</a>

    <!-- Simulador Earn / Referidos -->
    <div class="earn-box">
      <p><strong>Simula tu Earn / Referidos</strong></p>
      <p>Tu balance: <span id="balance">0</span> PandoX 🐼</p>
      <button onclick="earn()">Ganar PandoX</button>
      <p>Referidos: <span id="refs">0</span></p>
      <button onclick="addRef()">Nuevo referido</button>
    </div>
  </div>

  <script>
    let balance = 0;
    let refs = 0;

    function earn() {
      const earned = Math.floor(Math.random() * 5) + 1; // gana 1-5 PandoX
      balance += earned;
      document.getElementById('balance').innerText = balance;
      alert(`¡Ganaste ${earned} PandoX!`);
    }

    function addRef() {
      refs += 1;
      balance += 2; // bonus por referido
      document.getElementById('refs').innerText = refs;
      document.getElementById('balance').innerText = balance;
      alert(`¡Nuevo referido agregado! +2 PandoX`);
    }
  </script>
</body>
</html>
