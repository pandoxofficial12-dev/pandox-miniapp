<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandox MiniApp</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000; /* Fondo negro, puedes cambiarlo por tu fondo animado */
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #logo {
      width: 150px;
      display: block;
      margin: 10px auto;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      margin: 5px;
      background: #444;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    #game-area {
      position: relative;
      width: 100%;
      height: 500px;
      margin-top: 20px;
      background: url('assets/img/fire.jpeg.jpeg') no-repeat center;
      background-size: cover;
      overflow: hidden;
    }

    .coin {
      position: absolute;
      width: 40px;
      height: 40px;
      background-image: url('assets/img/coin.jpeg.jpeg');
      background-size: cover;
      animation: fall 5s linear infinite;
    }

    @keyframes fall {
      0% { top: -50px; transform: rotate(0deg); }
      100% { top: 500px; transform: rotate(360deg); }
    }

    #dino {
      width: 80px;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

  </style>
</head>
<body>

  <!-- Logo -->
  <img id="logo" src="assets/img/logo.png.jpeg" alt="Logo Pandox">

  <!-- Botones de redes sociales y wallet -->
  <div id="buttons" style="text-align:center;">
    <a class="button" href="https://t.me/tu_telegram" target="_blank">Telegram</a>
    <a class="button" href="https://twitter.com/tu_x" target="_blank">X</a>
    <a class="button" href="https://fofuwallet.com" target="_blank">Fofu Wallet</a>
  </div>

  <!-- Área de juego -->
  <div id="game-area">
    <!-- Dino -->
    <img id="dino" src="assets/img/dino.jpeg.jpeg" alt="Dino">
  </div>

  <!-- Sonidos -->
  <audio id="click" src="assets/audio/click.wav.wav"></audio>
  <audio id="coin" src="assets/audio/coin.wav.wav"></audio>
  <audio id="hit" src="assets/audio/hit.wav.wav"></audio>
  <audio id="jump" src="assets/audio/jump.wav.wav"></audio>

  <!-- Scripts -->
  <script>
    // Generar monedas cayendo
    function createCoin() {
      const coin = document.createElement('div');
      coin.className = 'coin';
      coin.style.left = Math.random() * (window.innerWidth - 40) + 'px';
      document.getElementById('game-area').appendChild(coin);

      // Quitar moneda después de 5s
      setTimeout(() => coin.remove(), 5000);
    }

    // Crear moneda cada 1.5s
    setInterval(createCoin, 1500);

    // Sonidos de botones
    const clickSound = document.getElementById('click');
    document.querySelectorAll('.button').forEach(btn => {
      btn.addEventListener('click', () => {
        clickSound.play();
      });
    });

    // Posible animación del dino (ejemplo básico)
    const dino = document.getElementById('dino');
    document.addEventListener('keydown', e => {
      if(e.code === 'Space') {
        const jumpSound = document.getElementById('jump');
        jumpSound.play();
        dino.style.bottom = '150px';
        setTimeout(() => dino.style.bottom = '0px', 500);
      }
    });

  </script>
</body>
</html>
