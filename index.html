<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandox Mini App 1.0 Deluxe</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
html, body { width:100%; height:100%; overflow:auto; background:#0b0c20; color:#fff; }
body { background: radial-gradient(circle at top, #0b0c20 0%, #050515 100%); overflow-x:auto; overflow-y:auto; }
canvas { position:fixed; top:0; left:0; z-index:-1; }

/* Contenedor principal */
.container { max-width:1200px; margin:0 auto; padding:20px; text-align:center; }

/* Título Deluxe */
h1 { font-size:2.5rem; margin-bottom:20px; color:#00bfff; text-shadow:0 0 15px #00bfff; }

/* Menú de juegos */
.menu { display:flex; justify-content:center; gap:20px; margin-bottom:30px; flex-wrap:wrap; }
.menu button {
  padding:15px 25px;
  font-size:1rem;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:linear-gradient(145deg, #005f9e, #00bfff);
  color:#fff;
  box-shadow:0 0 20px rgba(0,191,255,0.5);
  transition:all 0.3s ease;
}
.menu button:hover { transform:scale(1.1); box-shadow:0 0 30px #00f0ff; }

/* Juegos visibles */
.game { display:none; margin:0 auto; max-width:800px; min-height:400px; border-radius:12px; background:#10122c; padding:15px; box-shadow:0 0 25px rgba(0,191,255,0.3); }

/* Mini hub tipo moneda */
.minihub {
  margin-top:30px;
  padding:20px;
  border-radius:20px;
  background:radial-gradient(circle, #003366 0%, #001122 100%);
  box-shadow:0 0 30px #00bfff;
  position:relative;
}
.minihub h2 { color:#00f0ff; text-shadow:0 0 10px #00f0ff; }
.minihub .buttons { display:flex; justify-content:center; gap:15px; margin-top:15px; flex-wrap:wrap; }
.minihub .buttons a {
  padding:10px 20px;
  border-radius:10px;
  background:linear-gradient(145deg,#005f9e,#00bfff);
  color:#fff;
  text-decoration:none;
  box-shadow:0 0 15px rgba(0,191,255,0.5);
  transition:all 0.3s ease;
}
.minihub .buttons a:hover { transform:scale(1.1); box-shadow:0 0 25px #00f0ff; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>Pandox Mini App 1.0 Deluxe</h1>

  <!-- Menú de selección de juegos -->
  <div class="menu">
    <button onclick="showGame('dino')">Dino Run</button>
    <button onclick="showGame('clicker')">Clicker Game</button>
    <button onclick="showGame('snake')">Snake Game</button>
  </div>

  <!-- Juegos -->
  <div id="dino" class="game">
    <h2>Dino Run</h2>
    <canvas id="dinoCanvas" width="800" height="400" style="background:#000;"></canvas>
    <button onclick="startDino()">Start</button>
  </div>

  <div id="clicker" class="game">
    <h2>Clicker Game</h2>
    <canvas id="clickerCanvas" width="800" height="400" style="background:#000;"></canvas>
    <button onclick="startClicker()">Start</button>
  </div>

  <div id="snake" class="game">
    <h2>Snake Game</h2>
    <canvas id="snakeCanvas" width="800" height="400" style="background:#000;"></canvas>
    <button onclick="startSnake()">Start</button>
  </div>

  <!-- Mini Hub -->
  <div class="minihub">
    <h2>Mini Hub Deluxe</h2>
    <div class="buttons">
      <a href="https://t.me/PandoXOfficialCrypto" target="_blank">Telegram</a>
      <a href="https://x.com/PandoXOfficial" target="_blank">X</a>
      <a href="https://www.pufwallet.xyz/token/0xF968341A687D70BcF84121111CfBB5eF7148AC28" target="_blank">PUFF Wallet</a>
    </div>
  </div>
</div>

<!-- Audios -->
<audio id="clickSound" src="https://pandoxofficial12-dev.github.io/pandox-miniapp/assets/audio/click.wav.wav"></audio>
<audio id="coinSound" src="https://pandoxofficial12-dev.github.io/pandox-miniapp/assets/audio/coin.wav.wav"></audio>
<audio id="hitSound" src="https://pandoxofficial12-dev.github.io/pandox-miniapp/assets/audio/hit.wav.wav"></audio>
<audio id="jumpSound" src="https://pandoxofficial12-dev.github.io/pandox-miniapp/assets/audio/jump.wav.wav"></audio>

<script>
  // Mostrar juego seleccionado
  function showGame(id){
    document.querySelectorAll('.game').forEach(g=>g.style.display='none');
    document.getElementById(id).style.display='block';
  }

  // Partículas flotantes tipo monedas
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];
  for(let i=0;i<100;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*3+1,
      dx:(Math.random()-0.5)*2,
      dy:(Math.random()-0.5)*2,
      color:'#00bfff'
    });
  }

  function drawParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let p of particles){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if(p.x>canvas.width) p.x=0;
      if(p.x<0) p.x=canvas.width;
      if(p.y>canvas.height) p.y=0;
      if(p.y<0) p.y=canvas.height;
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // Sonidos botones
  document.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click',()=>{ document.getElementById('clickSound').play(); });
  });

  // --- JUEGOS INTEGRALES REALES ---
  // Dino Run
  const dinoCanvas = document.getElementById('dinoCanvas');
  const dinoCtx = dinoCanvas.getContext('2d');
  let dinoY = 300, dinoVy = 0, gravity = 0.8, jumpPower = -12;
  let obstacles = [];
  let dinoRunning = false;
  let dinoSprite = new Image();
  dinoSprite.src = "https://i.imgur.com/oNDRmG8.jpeg"; // dinosaurio

  function startDino(){
    if(dinoRunning) return;
    dinoRunning = true;
    obstacles = [];
    dinoY = 300; dinoVy=0;
    requestAnimationFrame(dinoLoop);
  }

  function dinoLoop(){
    dinoCtx.clearRect(0,0,dinoCanvas.width,dinoCanvas.height);
    // Dino
    dinoVy += gravity;
    dinoY += dinoVy;
    if(dinoY>300) { dinoY=300; dinoVy=0; }
    dinoCtx.drawImage(dinoSprite,50,dinoY,50,50);

    // Obstáculos
    if(Math.random()<0.02) obstacles.push({x:800, y:320, w:20, h:40});
    obstacles.forEach((ob,i)=> {
      ob.x -=5;
      dinoCtx.fillStyle='red';
      dinoCtx.fillRect(ob.x,ob.y,ob.w,ob.h);
      if(ob.x+ob.w<0) obstacles.splice(i,1);
      if(50<ob.x+ob.w && 50+50>ob.x && dinoY<ob.y+ob.h && dinoY+50>ob.y){
        dinoRunning=false;
        alert('Game Over!');
      }
    });

    if(dinoRunning) requestAnimationFrame(dinoLoop);
  }

  dinoCanvas.addEventListener('click',()=>{ if(dinoRunning){ dinoVy=jumpPower; document.getElementById('jumpSound').play(); } });

  // Clicker Game
  const clickerCanvas = document.getElementById('clickerCanvas');
  const clickerCtx = clickerCanvas.getContext('2d');
  let clicks = 0;
  let clickerRunning=false;
  let coinImg = new Image();
  coinImg.src = "https://i.imgur.com/MZHNoD1.png"; // coin

  function startClicker(){
    if(clickerRunning) return;
    clickerRunning = true;
    clicks=0;
    clickerLoop();
  }

  function clickerLoop(){
    clickerCtx.clearRect(0,0,clickerCanvas.width,clickerCanvas.height);
    clickerCtx.fillStyle='#00bfff';
    clickerCtx.font='30px Arial';
    clickerCtx.fillText('Clicks: '+clicks,50,50);
    clickerCtx.drawImage(coinImg,100,100,50,50);
    if(clickerRunning) requestAnimationFrame(clickerLoop);
  }

  clickerCanvas.addEventListener('click',()=>{ if(clickerRunning){ clicks++; document.getElementById('coinSound').play(); } });

  // Snake Game
  const snakeCanvas = document.getElementById('snakeCanvas');
  const snakeCtx = snakeCanvas.getContext('2d');
  let snake=[], snakeDir='right', snakeRunning=false, food={x:0,y:0};

  function startSnake(){
    if(snakeRunning) return;
    snakeRunning=true;
    snake=[{x:10,y:10}];
    snakeDir='right';
    spawnFood();
    snakeLoop();
  }

  function spawnFood(){ food.x=Math.floor(Math.random()*16)*25; food.y=Math.floor(Math.random()*16)*25; }

  function snakeLoop(){
    snakeCtx.clearRect(0,0,snakeCanvas.width,snakeCanvas.height);
    snakeCtx.fillStyle='yellow';
    snakeCtx.fillRect(food.x,food.y,25,25);
    snake.forEach((s,i)=>{
      snakeCtx.fillStyle='lime';
      snakeCtx.fillRect(s.x*25,s.y*25,25,25);
    });

    let head={x:snake[0].x,y:snake[0].y};
    if(snakeDir=='right') head.x+=1;
    if(snakeDir=='left') head.x-=1;
    if(snakeDir=='up') head.y-=1;
    if(snakeDir=='down') head.y+=1;

    snake.unshift(head);

    if(head.x*25===food.x && head.y*25===food.y){ spawnFood(); document.getElementById('coinSound').play(); }
    else{ snake.pop(); }

    if(head.x<0 || head.x>=32 || head.y<0 || head.y>=16 || snake.slice(1).some(s=>s.x===head.x && s.y===head.y)){
      snakeRunning=false;
      alert('Game Over!');
    }

    if(snakeRunning) setTimeout(snakeLoop,100);
  }

  window.addEventListener('keydown',(e)=>{
    if(!snakeRunning) return;
    if(e.key==='ArrowUp' && snakeDir!=='down') snakeDir='up';
    if(e.key==='ArrowDown' && snakeDir!=='up') snakeDir='down';
    if(e.key==='ArrowLeft' && snakeDir!=='right') snakeDir='left';
    if(e.key==='ArrowRight' && snakeDir!=='left') snakeDir='right';
  });

  // Ajuste canvas al cambiar tamaño ventana
  window.addEventListener('resize',()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>

</body>
</html>
